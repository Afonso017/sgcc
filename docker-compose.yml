services:
  db:
    image: postgres:15-alpine
    container_name: condominio_db
    environment:
      POSTGRES_DB: condominiodb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      TZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d condominiodb"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: condominio_app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
    volumes:
      - ./uploads:/app/uploads

volumes:
  pgdata: